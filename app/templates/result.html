{% extends "base.html" %}

{% block content %}
<main class="min-h-screen flex items-center justify-center px-4 sm:px-6 py-12 sm:py-16"
      x-data="{
          result: null,
          loaded: false,
          copied: false,
          init() {
              const raw = sessionStorage.getItem('quizResult');
              if (!raw) { window.location.href = '/'; return; }
              this.result = JSON.parse(raw);
              setTimeout(() => this.loaded = true, 100);
          },
          get gaugeOffset() {
              if (!this.result) return 283;
              const pct = (this.result.total_score - 6) / 18;
              return 283 - (283 * pct);
          },
          get gaugeColor() {
              if (!this.result) return '#6B6B6B';
              const s = this.result.total_score;
              if (s >= 20) return '#DC2626';
              if (s >= 14) return '#F59E0B';
              if (s >= 8) return '#2A6B6B';
              return '#059669';
          },
          get riskLabel() {
              if (!this.result) return '';
              return this.lang === 'zh' ? this.result.risk_label_zh : this.result.risk_label_en;
          },
          get advice() {
              if (!this.result) return '';
              return this.lang === 'zh' ? this.result.advice_zh : this.result.advice_en;
          },
          get jobName() {
              if (!this.result) return '';
              return this.lang === 'zh' ? this.result.job_name_zh : this.result.job_name_en;
          },
          questionLabels(idx) {
              const zh = ['职业类型', '产出形式', '知识类型', '委托能力', '容错率', '职级定位'];
              const en = ['Job Type', 'Output Form', 'Knowledge Type', 'Delegation', 'Error Tolerance', 'Career Level'];
              return this.lang === 'zh' ? zh[idx] : en[idx];
          },
          riskTag(score) {
              if (score === 4) return this.lang === 'zh' ? '高危' : 'High Risk';
              if (score === 3) return this.lang === 'zh' ? '中高风险' : 'Med-High';
              if (score === 2) return this.lang === 'zh' ? '较低风险' : 'Low Risk';
              return this.lang === 'zh' ? '安全' : 'Safe';
          },
          riskTagColor(score) {
              if (score === 4) return 'bg-red-50 text-red-600 border-red-200';
              if (score === 3) return 'bg-amber-50 text-amber-600 border-amber-200';
              if (score === 2) return 'bg-teal-50 text-teal-600 border-teal-200';
              return 'bg-emerald-50 text-emerald-600 border-emerald-200';
          },
          async copyResult() {
              const text = this.lang === 'zh'
                  ? `我的AI替代风险测试结果：${this.result.total_score}分（${this.result.risk_label_zh}）\n职业：${this.result.job_name_zh}\n来测测你的吧！`
                  : `My AI Replacement Risk Score: ${this.result.total_score} (${this.result.risk_label_en})\nJob: ${this.result.job_name_en}\nTake the quiz!`;
              await navigator.clipboard.writeText(text);
              this.copied = true;
              setTimeout(() => this.copied = false, 2000);
          },
      }">

    <div x-show="result && loaded" class="w-full max-w-lg">
        <!-- Override result (special jobs) -->
        <template x-if="result && result.risk_level === 'override'">
            <div class="text-center mb-8 sm:mb-10 fade-in">
                <div class="inline-flex items-center justify-center w-20 h-20 sm:w-24 sm:h-24 rounded-full bg-warm mb-6">
                    <svg class="w-10 h-10 sm:w-12 sm:h-12 text-muted" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/>
                    </svg>
                </div>
                <p class="text-xs sm:text-sm text-muted mb-2" x-text="jobName"></p>
                <h1 class="font-serif text-xl sm:text-2xl font-bold mb-2 fade-in fade-in-delay-1 leading-snug text-muted"
                    x-text="riskLabel">
                </h1>
            </div>
        </template>

        <!-- Normal score gauge -->
        <template x-if="result && result.risk_level !== 'override'">
            <div class="text-center mb-8 sm:mb-10 fade-in">
                <div class="relative inline-block w-36 h-36 sm:w-48 sm:h-48 mb-4 sm:mb-6">
                    <svg class="w-full h-full -rotate-90" viewBox="0 0 100 100">
                        <circle cx="50" cy="50" r="45" fill="none" stroke="#E5E0DA" stroke-width="6"/>
                        <circle cx="50" cy="50" r="45" fill="none"
                                :stroke="gaugeColor" stroke-width="6"
                                stroke-linecap="round"
                                stroke-dasharray="283"
                                :stroke-dashoffset="gaugeOffset"
                                class="gauge-circle"/>
                    </svg>
                    <div class="absolute inset-0 flex flex-col items-center justify-center">
                        <span class="text-4xl sm:text-5xl font-serif font-bold score-reveal" x-text="result.total_score"></span>
                        <span class="text-xs sm:text-sm text-muted mt-1" x-text="'/ 24'"></span>
                    </div>
                </div>
                <p class="text-xs sm:text-sm text-muted mb-2" x-text="jobName"></p>
                <h1 class="font-serif text-xl sm:text-2xl md:text-3xl font-bold mb-2 fade-in fade-in-delay-1 leading-snug"
                    :style="`color: ${gaugeColor}`"
                    x-text="riskLabel">
                </h1>
            </div>
        </template>

        <!-- Advice -->
        <div class="bg-white rounded-2xl border border-border p-5 sm:p-6 md:p-8 mb-6 sm:mb-8 fade-in fade-in-delay-2">
            <h3 class="font-serif font-bold text-base sm:text-lg mb-2 sm:mb-3">
                <span x-show="lang === 'zh'">分析与建议</span>
                <span x-show="lang === 'en'" x-cloak>Analysis & Advice</span>
            </h3>
            <p class="text-sm sm:text-base text-ink2 leading-relaxed whitespace-pre-line" x-text="advice"></p>
        </div>

        <!-- Score breakdown (hidden for override jobs) -->
        <div x-show="result.risk_level !== 'override'" class="bg-white rounded-2xl border border-border p-5 sm:p-6 md:p-8 mb-6 sm:mb-8 fade-in fade-in-delay-3">
            <h3 class="font-serif font-bold text-base sm:text-lg mb-4 sm:mb-5">
                <span x-show="lang === 'zh'">维度拆解</span>
                <span x-show="lang === 'en'" x-cloak>Dimension Breakdown</span>
            </h3>
            <div class="space-y-2.5 sm:space-y-3">
                <template x-for="(score, idx) in result.breakdown" :key="idx">
                    <div class="flex items-center justify-between py-1.5">
                        <span class="text-xs sm:text-sm text-muted" x-text="questionLabels(idx)"></span>
                        <span class="text-[11px] sm:text-xs font-medium px-2.5 py-1 rounded-full border"
                              :class="riskTagColor(score)"
                              x-text="riskTag(score)">
                        </span>
                    </div>
                </template>
            </div>
        </div>

        <!-- Actions -->
        <div class="flex flex-col sm:flex-row gap-3 fade-in fade-in-delay-4">
            <button @click="copyResult()"
                    class="flex-1 px-6 py-3 sm:py-3.5 rounded-full border border-border bg-white text-ink text-sm sm:text-base font-medium hover:border-ink/30 active:scale-95 transition-all text-center">
                <span x-show="!copied && lang === 'zh'">复制分享结果</span>
                <span x-show="!copied && lang === 'en'" x-cloak>Copy & Share</span>
                <span x-show="copied && lang === 'zh'">已复制!</span>
                <span x-show="copied && lang === 'en'" x-cloak>Copied!</span>
            </button>
            <a href="/questionnaire"
               class="flex-1 px-6 py-3 sm:py-3.5 rounded-full bg-ink text-cream text-sm sm:text-base font-medium hover:bg-ink2 active:scale-95 transition-all text-center">
                <span x-show="lang === 'zh'">重新测试</span>
                <span x-show="lang === 'en'" x-cloak>Retake Quiz</span>
            </a>
        </div>

        <!-- Footer -->
        <p class="text-center text-xs sm:text-sm text-muted/50 mt-8 sm:mt-10 fade-in fade-in-delay-5">
            <span x-show="lang === 'zh'">本测试仅供参考，不构成职业建议</span>
            <span x-show="lang === 'en'" x-cloak>This quiz is for reference only and does not constitute career advice</span>
        </p>
    </div>
</main>
{% endblock %}
