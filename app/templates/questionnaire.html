{% extends "base.html" %}

{% block content %}
<!-- Pass server data to JS once -->
<script>
    window.__QUIZ_DATA__ = {
        jobs: {{ jobs | tojson }},
        jobGroups: {{ job_groups | tojson }},
        questions: {{ questions | tojson }},
    };
</script>
<script src="/static/js/questionnaire.js"></script>

<main class="min-h-screen flex flex-col" x-data="quiz">
    <!-- Progress bar -->
    <div class="fixed top-0 left-0 right-0 z-40 h-1 bg-border">
        <div class="progress-fill h-full bg-accent" :style="`width: ${progress}%`"></div>
    </div>

    <!-- Header -->
    <div class="pt-12 pb-4 px-4 text-center">
        <p class="text-sm text-muted font-medium tracking-wide" x-text="progressText"></p>
    </div>

    <!-- Content area -->
    <div class="flex-1 flex items-start justify-center px-4 pb-20">
        <div class="w-full max-w-2xl">

            <!-- ═══ Q1: Job Selection ═══ -->
            <div x-show="currentStep === 0"
                 x-transition:enter="transition ease-out duration-300"
                 x-transition:enter-start="opacity-0 translate-y-4"
                 x-transition:enter-end="opacity-100 translate-y-0"
                 x-transition:leave.duration.0ms>

                <h2 class="font-serif text-2xl md:text-3xl font-bold mb-2 text-center">
                    <span x-show="lang === 'zh'">Q1. 您的具体职业是什么？</span>
                    <span x-show="lang === 'en'" x-cloak>Q1. What is your specific occupation?</span>
                </h2>
                <p class="text-muted text-center mb-8 text-sm">
                    <span x-show="lang === 'zh'">基准定位 — 选择最接近您工作的职业</span>
                    <span x-show="lang === 'en'" x-cloak>Baseline positioning — choose the job closest to yours</span>
                </p>

                <!-- Search -->
                <div class="relative mb-8">
                    <input type="text"
                           x-model="searchQuery"
                           class="w-full px-5 py-3.5 rounded-xl border border-border bg-white text-ink placeholder-muted/50 focus:outline-none focus:border-accent focus:ring-1 focus:ring-accent/20 transition-all"
                           :placeholder="lang === 'zh' ? '搜索你的职业...' : 'Search your job...'"
                    >
                    <svg class="absolute right-4 top-1/2 -translate-y-1/2 w-5 h-5 text-muted/40" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
                    </svg>
                </div>

                <!-- Job groups -->
                <template x-for="group in jobGroups" :key="group.id">
                    <div x-show="hasJobsInGroup(group.id)" class="mb-6">
                        <h3 class="text-xs font-medium text-muted uppercase tracking-wider mb-3">
                            <span x-show="lang === 'zh'" x-text="group.name_zh"></span>
                            <span x-show="lang === 'en'" x-cloak x-text="group.name_en"></span>
                        </h3>
                        <div class="flex flex-wrap gap-2">
                            <template x-for="job in filteredJobs(group.id)" :key="job.id">
                                <button
                                    @click="selectJob(job)"
                                    class="job-chip px-4 py-2 rounded-lg border text-sm font-medium cursor-pointer"
                                    :class="selectedJob && selectedJob.id === job.id
                                        ? 'selected'
                                        : 'border-border bg-white text-ink2 hover:border-accent/40'"
                                    x-text="lang === 'zh' ? job.name_zh : job.name_en"
                                ></button>
                            </template>
                        </div>
                    </div>
                </template>
            </div>

            <!-- ═══ Q2-Q6: Multiple Choice ═══ -->
            <template x-for="(q, qIdx) in questions" :key="q.id">
                <div x-show="currentStep === qIdx + 1"
                     x-transition:enter="transition ease-out duration-300"
                     x-transition:enter-start="opacity-0 translate-y-4"
                     x-transition:enter-end="opacity-100 translate-y-0"
                     x-transition:leave.duration.0ms>

                    <h2 class="font-serif text-2xl md:text-3xl font-bold mb-2 text-center">
                        <span x-show="lang === 'zh'" x-text="'Q' + q.id + '. ' + q.text_zh"></span>
                        <span x-show="lang === 'en'" x-cloak x-text="'Q' + q.id + '. ' + q.text_en"></span>
                    </h2>
                    <p class="text-muted text-center mb-10 text-sm">
                        <span x-show="lang === 'zh'" x-text="q.subtitle_zh"></span>
                        <span x-show="lang === 'en'" x-cloak x-text="q.subtitle_en"></span>
                    </p>

                    <div class="space-y-4">
                        <template x-for="opt in q.options" :key="opt.label">
                            <button
                                @click="selectOption(qIdx, opt)"
                                class="option-card w-full text-left px-6 py-5 rounded-xl border bg-white cursor-pointer"
                                :class="isOptionSelected(qIdx, opt.label)
                                    ? 'selected border-accent bg-accent-light'
                                    : 'border-border hover:border-accent/30'"
                            >
                                <div class="flex items-start gap-4">
                                    <span class="flex-shrink-0 w-8 h-8 rounded-full flex items-center justify-center text-sm font-bold transition-colors"
                                          :class="isOptionSelected(qIdx, opt.label)
                                              ? 'bg-accent text-white'
                                              : 'bg-warm text-muted'"
                                          x-text="opt.label">
                                    </span>
                                    <span class="text-base leading-relaxed" x-show="lang === 'zh'" x-text="opt.text_zh"></span>
                                    <span class="text-base leading-relaxed" x-show="lang === 'en'" x-cloak x-text="opt.text_en"></span>
                                </div>
                            </button>
                        </template>
                    </div>
                </div>
            </template>

            <!-- ═══ Submitting state ═══ -->
            <div x-show="currentStep === 6" class="text-center py-20">
                <div class="inline-block w-8 h-8 border-2 border-accent border-t-transparent rounded-full animate-spin mb-4"></div>
                <p class="text-muted">
                    <span x-show="lang === 'zh'">正在计算您的结果...</span>
                    <span x-show="lang === 'en'" x-cloak>Calculating your results...</span>
                </p>
            </div>
        </div>
    </div>

    <!-- Back button -->
    <div class="fixed bottom-0 left-0 right-0 z-40 pb-6 px-4" x-show="canGoBack && currentStep < 6">
        <div class="max-w-2xl mx-auto">
            <button @click="goBack()"
                    class="flex items-center gap-2 text-sm text-muted hover:text-ink transition-colors">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
                </svg>
                <span x-show="lang === 'zh'">上一题</span>
                <span x-show="lang === 'en'" x-cloak>Previous</span>
            </button>
        </div>
    </div>
</main>
{% endblock %}
