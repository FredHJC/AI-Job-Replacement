{% extends "base.html" %}

{% block content %}
<!-- Pass server data to JS once -->
<script>
    window.__QUIZ_DATA__ = {
        jobs: {{ jobs | tojson }},
        jobGroups: {{ job_groups | tojson }},
        questions: {{ questions | tojson }},
        overrideJobs: {{ override_jobs | tojson }},
        consistencyWarnings: {{ consistency_warnings | tojson }},
    };
</script>
<script src="/static/js/questionnaire.js?v={{ v }}"></script>

<main class="min-h-screen flex flex-col" x-data="quiz">
    <!-- Progress bar -->
    <div class="fixed top-0 left-0 right-0 z-40 h-1 bg-border">
        <div class="progress-fill h-full bg-accent" :style="`width: ${progress}%`"></div>
    </div>

    <!-- Header -->
    <div class="pt-10 sm:pt-12 pb-3 sm:pb-4 px-4 text-center">
        <p class="text-xs sm:text-sm text-muted font-medium tracking-wide" x-text="progressText"></p>
    </div>

    <!-- Content area -->
    <div class="flex-1 flex items-start justify-center px-4 sm:px-6 pb-24 sm:pb-20">
        <div class="w-full max-w-2xl">

            <!-- ═══ Q1: Job Selection ═══ -->
            <div x-show="currentStep === 0"
                 x-transition:enter="transition ease-out duration-300 delay-150"
                 x-transition:enter-start="opacity-0 translate-y-5"
                 x-transition:enter-end="opacity-100 translate-y-0"
                 x-transition:leave="transition ease-in duration-150"
                 x-transition:leave-start="opacity-100 translate-y-0"
                 x-transition:leave-end="opacity-0 -translate-y-5">

                <h2 class="font-serif text-xl sm:text-2xl md:text-3xl font-bold mb-2 text-center">
                    <span x-show="lang === 'zh'">Q1. 您的具体职业是什么？</span>
                    <span x-show="lang === 'en'" x-cloak>Q1. What is your specific occupation?</span>
                </h2>
                <p class="text-muted text-center mb-5 sm:mb-8 text-xs sm:text-sm">
                    <span x-show="lang === 'zh'">基准定位 — 选择最接近您工作的职业</span>
                    <span x-show="lang === 'en'" x-cloak>Baseline positioning — choose the job closest to yours</span>
                </p>

                <!-- Search -->
                <div class="relative mb-5 sm:mb-8">
                    <input type="text"
                           x-model="searchQuery"
                           class="w-full px-4 sm:px-5 py-3 sm:py-3.5 rounded-xl border border-border bg-white text-ink text-sm sm:text-base placeholder-muted/50 focus:outline-none focus:border-accent focus:ring-1 focus:ring-accent/20 transition-all"
                           :placeholder="lang === 'zh' ? '搜索你的职业...' : 'Search your job...'"
                    >
                    <svg class="absolute right-3 sm:right-4 top-1/2 -translate-y-1/2 w-4 h-4 sm:w-5 sm:h-5 text-muted/40" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
                    </svg>
                </div>

                <!-- Job groups (accordion) -->
                <div class="space-y-2 sm:space-y-3">
                    <template x-for="group in jobGroups" :key="group.id">
                        <div x-show="hasJobsInGroup(group.id)"
                             class="border border-border rounded-xl overflow-hidden bg-white">
                            <!-- Group header (clickable) -->
                            <button @click="toggleGroup(group.id)"
                                    class="w-full flex items-center justify-between px-4 sm:px-5 py-3 sm:py-3.5 text-left hover:bg-warm/50 active:bg-warm transition-colors">
                                <span class="text-sm sm:text-base font-medium text-ink">
                                    <span x-show="lang === 'zh'" x-text="group.name_zh"></span>
                                    <span x-show="lang === 'en'" x-cloak x-text="group.name_en"></span>
                                </span>
                                <div class="flex items-center gap-2">
                                    <span class="text-[10px] sm:text-xs text-muted" x-text="filteredJobs(group.id).length"></span>
                                    <svg class="w-4 h-4 text-muted transition-transform duration-200"
                                         :class="openGroups.includes(group.id) ? 'rotate-180' : ''"
                                         fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
                                    </svg>
                                </div>
                            </button>
                            <!-- Expanded job chips -->
                            <div x-show="openGroups.includes(group.id) || searchQuery.trim()"
                                 x-collapse
                                 class="px-4 sm:px-5 pb-3 sm:pb-4">
                                <div class="flex flex-wrap gap-1.5 sm:gap-2 pt-1">
                                    <template x-for="job in filteredJobs(group.id)" :key="job.id">
                                        <button
                                            @click="selectJob(job)"
                                            class="job-chip px-3 sm:px-4 py-1.5 sm:py-2 rounded-lg border text-xs sm:text-sm font-medium cursor-pointer"
                                            :class="selectedJob && selectedJob.id === job.id
                                                ? 'selected'
                                                : 'border-border bg-white text-ink2 hover:border-accent/40 active:scale-95'"
                                            x-text="lang === 'zh' ? job.name_zh : job.name_en"
                                        ></button>
                                    </template>
                                </div>
                            </div>
                        </div>
                    </template>
                </div>
            </div>

            <!-- ═══ Q2-Q6: Multiple Choice ═══ -->
            <template x-for="(q, qIdx) in questions" :key="q.id">
                <div x-show="currentStep === qIdx + 1"
                     x-transition:enter="transition ease-out duration-300 delay-150"
                     x-transition:enter-start="opacity-0 translate-y-5"
                     x-transition:enter-end="opacity-100 translate-y-0"
                     x-transition:leave="transition ease-in duration-150"
                     x-transition:leave-start="opacity-100 translate-y-0"
                     x-transition:leave-end="opacity-0 -translate-y-5">

                    <h2 class="font-serif text-lg sm:text-2xl md:text-3xl font-bold mb-2 text-center leading-snug">
                        <span x-show="lang === 'zh'" x-text="'Q' + q.id + '. ' + q.text_zh"></span>
                        <span x-show="lang === 'en'" x-cloak x-text="'Q' + q.id + '. ' + q.text_en"></span>
                    </h2>
                    <p class="text-muted text-center mb-6 sm:mb-10 text-xs sm:text-sm">
                        <span x-show="lang === 'zh'" x-text="q.subtitle_zh"></span>
                        <span x-show="lang === 'en'" x-cloak x-text="q.subtitle_en"></span>
                    </p>

                    <div class="space-y-3 sm:space-y-4">
                        <template x-for="opt in q.options" :key="opt.label">
                            <button
                                @click="selectOption(qIdx, opt)"
                                class="option-card w-full text-left px-4 sm:px-6 py-4 sm:py-5 rounded-xl border bg-white cursor-pointer"
                                :class="isOptionSelected(qIdx, opt.label)
                                    ? 'selected border-accent bg-accent-light'
                                    : 'border-border hover:border-accent/30 active:scale-[0.98]'"
                            >
                                <div class="flex items-start gap-3 sm:gap-4">
                                    <span class="flex-shrink-0 w-7 h-7 sm:w-8 sm:h-8 rounded-full flex items-center justify-center text-xs sm:text-sm font-bold transition-colors"
                                          :class="isOptionSelected(qIdx, opt.label)
                                              ? 'bg-accent text-white'
                                              : 'bg-warm text-muted'"
                                          x-text="opt.label">
                                    </span>
                                    <span class="text-sm sm:text-base leading-relaxed" x-show="lang === 'zh'" x-html="opt.text_zh"></span>
                                    <span class="text-sm sm:text-base leading-relaxed" x-show="lang === 'en'" x-cloak x-html="opt.text_en"></span>
                                </div>
                            </button>
                        </template>
                    </div>
                </div>
            </template>

            <!-- ═══ Submitting state ═══ -->
            <div x-show="currentStep === 6" class="text-center py-20">
                <div class="inline-block w-8 h-8 border-2 border-accent border-t-transparent rounded-full animate-spin mb-4"></div>
                <p class="text-muted text-sm">
                    <span x-show="lang === 'zh'">正在计算您的结果...</span>
                    <span x-show="lang === 'en'" x-cloak>Calculating your results...</span>
                </p>
            </div>
        </div>
    </div>

    <!-- Back button -->
    <div class="fixed bottom-0 left-0 right-0 z-40 pb-4 sm:pb-6 px-4 safe-area-pad-bottom" x-show="canGoBack && currentStep < 6">
        <div class="max-w-2xl mx-auto">
            <button @click="goBack()"
                    class="flex items-center gap-2 text-xs sm:text-sm text-muted hover:text-ink active:text-ink transition-colors py-2">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
                </svg>
                <span x-show="lang === 'zh'">上一题</span>
                <span x-show="lang === 'en'" x-cloak>Previous</span>
            </button>
        </div>
    </div>

    <!-- Consistency warning modal -->
    <div x-show="warningText" x-cloak
         class="fixed inset-0 z-50 flex items-center justify-center bg-ink/30 backdrop-blur-sm px-4"
         @click.self="dismissWarning(false)">
        <div class="bg-white rounded-2xl border border-border p-6 sm:p-8 max-w-md w-full shadow-xl"
             x-transition:enter="transition ease-out duration-200"
             x-transition:enter-start="opacity-0 scale-95"
             x-transition:enter-end="opacity-100 scale-100">
            <div class="flex items-start gap-3 mb-4">
                <div class="flex-shrink-0 w-8 h-8 rounded-full bg-amber-50 flex items-center justify-center">
                    <svg class="w-5 h-5 text-amber-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-2.5L13.732 4c-.77-.833-1.964-.833-2.732 0L4.082 16.5c-.77.833.192 2.5 1.732 2.5z"/>
                    </svg>
                </div>
                <p class="text-sm sm:text-base text-ink2 leading-relaxed" x-text="warningText"></p>
            </div>
            <div class="flex gap-3">
                <button @click="dismissWarning(false)"
                        class="flex-1 px-4 py-2.5 text-sm rounded-full border border-border text-muted hover:text-ink hover:border-ink/30 transition-all">
                    <span x-show="lang === 'zh'">重新选择</span>
                    <span x-show="lang === 'en'" x-cloak>Change Answer</span>
                </button>
                <button @click="dismissWarning(true)"
                        class="flex-1 px-4 py-2.5 text-sm rounded-full bg-ink text-cream hover:bg-ink2 transition-all">
                    <span x-show="lang === 'zh'">确认无误</span>
                    <span x-show="lang === 'en'" x-cloak>Confirm</span>
                </button>
            </div>
        </div>
    </div>
</main>
{% endblock %}
